<!doctype html>
<html lang="en">
{{ partial "head.html" . }}

<body>
    <a class="skip-link" href="#main-content">Skip to content</a>

    <div class="page-shell">
        <header class="site-header" id="top">
            <div class="site-header-inner">
                <a class="brand" href="{{ "/" | relURL }}" aria-label="Homepage">
                    <span class="brand-label">{{ hugo.Data.site.hero.eyebrow }}</span>
                    <span class="brand-title">{{ hugo.Data.site.hero.title }}</span>
                </a>

                <nav class="top-nav" aria-label="Main navigation">
                    {{ range .Site.Menus.main }}
                    <a href="{{ .URL | relURL }}">{{ .Name }}</a>
                    {{ end }}
                </nav>
            </div>
        </header>

        <main id="main-content">
            {{ block "main" . }}{{ end }}
        </main>

        <footer class="site-footer theme-dark reveal" data-reveal-index="9">
            <div class="site-footer-inner">
                <p>{{ hugo.Data.site.footer.lineOne }}</p>
                <p>{{ hugo.Data.site.footer.lineTwo }}</p>
                <p>&copy; {{ now.Format "2006" }}</p>
            </div>
        </footer>
    </div>

    <script>
        window.__SITE_CONFIG__ = {
            apiBaseUrl: "{{ .Site.Params.apiBaseUrl }}"
        };
    </script>
    <script src="{{ "/js/main.js" | relURL }}" defer></script>
</body>

</html>
