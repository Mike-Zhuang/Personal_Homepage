<!doctype html>
<html lang="en">
{{ partial "head.html" . }}

<body>
    <a class="skip-link" href="#main-content">Skip to content</a>

    <div class="page-shell">
        <header class="site-header" id="top">
            <div class="site-header-inner">
                <a class="brand" href="{{ "/" | relURL }}" aria-label="Homepage">
                    <span class="brand-label">{{ .Site.Data.site.hero.eyebrow }}</span>
                    <span class="brand-title">{{ .Site.Data.site.hero.title }}</span>
                </a>

                <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav" data-nav-toggle>
                    <span class="nav-toggle-bar"></span>
                    <span class="nav-toggle-bar"></span>
                    <span class="nav-toggle-label">Menu</span>
                </button>

                <nav class="top-nav" id="site-nav" aria-label="Main navigation" data-nav>
                    {{ range .Site.Menus.main }}
                    <a href="{{ .URL | relURL }}" data-nav-link>{{ .Name }}</a>
                    {{ end }}
                </nav>
            </div>
        </header>

        <div class="nav-backdrop" data-nav-backdrop></div>

        <main id="main-content">
            {{ block "main" . }}{{ end }}
        </main>

        <footer class="site-footer theme-dark reveal" data-reveal-index="5">
            <div class="site-footer-inner">
                <p>{{ .Site.Data.site.footer.lineOne }}</p>
                <p>{{ .Site.Data.site.footer.lineTwo }}</p>
                <p>&copy; {{ now.Format "2006" }}</p>
            </div>
        </footer>
    </div>

    <script src="{{ "js/main.js" | relURL }}" defer></script>
</body>

</html>
